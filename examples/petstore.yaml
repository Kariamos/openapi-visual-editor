openapi: 3.0.3
info:
  title: Petstore API
  description: A sample API that uses a petstore as an example
  version: 1.0.0
servers:
  - url: https://petstore.example.com/v1
    description: Production server
tags:
  - name: pets
    description: Everything about your Pets
  - name: owners
    description: Pet owners management
paths:
  /pets:
    get:
      summary: List all pets
      operationId: listPets
      tags:
        - pets
      parameters:
        - name: limit
          in: query
          description: How many items to return at one time (max 100)
          required: false
          schema:
            type: integer
            format: int32
        - name: tag
          in: query
          description: Filter pets by tag
          required: false
          schema:
            type: string
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: Create a pet
      operationId: createPet
      tags:
        - pets
      requestBody:
        required: true
        description: Pet object to be created
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPet"
      responses:
        "201":
          description: Pet created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      parameters: []
      security:
        - bearerAuth: []
  /pets/{petId}:
    get:
      summary: Info for a specific pet
      operationId: showPetById
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          description: The id of the pet to retrieve
          schema:
            type: string
      responses:
        "200":
          description: Expected response to a valid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Update a pet
      operationId: updatePet
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          description: The id of the pet to update
          schema:
            type: string
      requestBody:
        required: true
        description: Updated pet data
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPet"
      responses:
        "200":
          description: Pet updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security:
        - bearerAuth: []
    delete:
      summary: Delete a pet
      operationId: deletePet
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          description: The id of the pet to delete
          schema:
            type: string
      responses:
        "204":
          description: Pet deleted
        "404":
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security:
        - bearerAuth: []
  /owners:
    get:
      summary: List all owners
      operationId: listOwners
      tags:
        - owners
      responses:
        "200":
          description: A list of owners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Owner"
    post:
      summary: Register a new owner
      operationId: createOwner
      tags:
        - owners
      requestBody:
        required: true
        description: Owner to register
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Owner"
      responses:
        "201":
          description: Owner registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Owner"
        "409":
          description: Owner already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security:
        - bearerAuth: []
  /owners/{ownerId}/pets:
    get:
      summary: List pets belonging to an owner
      operationId: listPetsByOwner
      tags:
        - owners
        - pets
      parameters:
        - name: ownerId
          in: path
          required: true
          description: The id of the owner
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Pets owned by this owner
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
        "404":
          description: Owner not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the pet
          example: 42
        name:
          type: string
          description: Name of the pet
          example: Fido
        tag:
          type: string
          description: Optional tag for categorisation
          example: dog
        owner:
          $ref: "#/components/schemas/Owner"
    NewPet:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the pet
          example: Fido
        tag:
          type: string
          description: Optional tag for categorisation
          example: dog
        ownerId:
          type: integer
          format: int64
          description: ID of the owner (optional at creation)
    Owner:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the owner
          example: 1
        name:
          type: string
          description: Full name of the owner
          example: John Doe
        email:
          type: string
          format: email
          description: Contact email
          example: john@example.com
        address:
          type: object
          properties:
            street:
              type: string
              example: 123 Main St
            city:
              type: string
              example: Springfield
            zip:
              type: string
              example: "12345"
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
          description: HTTP error code
          example: 404
        message:
          type: string
          description: Human-readable error message
          example: Resource not found
