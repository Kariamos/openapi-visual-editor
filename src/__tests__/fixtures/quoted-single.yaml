openapi: '3.0.3'
info:
  title: 'Quoted API'
  version: '1.2.3'
  description: 'All strings use single quotes'
servers:
  - url: 'https://api.example.com/v1'
paths:
  '/items':
    get:
      summary: 'List items'
      operationId: 'listItems'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
components:
  schemas:
    Item:
      type: 'object'
      properties:
        id:
          type: 'string'
          format: 'uuid'
        name:
          type: 'string'
