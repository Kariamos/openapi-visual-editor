name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.3.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '${{ inputs.version }}'. Expected: X.Y.Z (e.g. 1.3.0)"
            exit 1
          fi

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install webview dependencies
        run: cd webview && npm ci

      - name: Bump version in package.json
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - name: Build all
        run: npm run build:all

      - name: Package VSIX
        run: npx vsce package

      - name: Commit version bump, tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git tag -a "v${{ inputs.version }}" -m "v${{ inputs.version }}"
          git push origin main --tags

      - name: Create GitHub Release with VSIX
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            *.vsix \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            --target main

      - name: Sync develop with main
        run: |
          git checkout develop
          git merge main --no-edit
          git push origin develop
