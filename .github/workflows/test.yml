name: test

on:
  push:
    branches:
      - main
      - develop
      - 'claude/**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root dependencies
        run: npm ci
      - name: Install webview dependencies
        working-directory: webview
        run: npm ci
      - name: Compile TypeScript
        run: npm run compile
      - name: Run tests
        run: npm test
